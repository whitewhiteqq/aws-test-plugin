name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  lockfile:
    name: Lockfile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is up-to-date
        run: uv lock --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lockfile]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  lint:
    name: Lint
    needs: [lockfile]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (no sdist builds)
        run: uv sync --frozen --no-build --no-install-project

      - name: Ruff check
        run: uv run --no-sync ruff check src tests

      - name: Ruff format check
        run: uv run --no-sync ruff format --check src tests

  typecheck:
    name: Type Check
    needs: [lockfile]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (no sdist builds)
        run: uv sync --frozen --no-build --no-install-project

      - name: Run mypy
        run: uv run --no-sync mypy src

  security:
    name: Security
    needs: [lockfile]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (no sdist builds)
        run: uv sync --frozen --no-build --no-install-project

      - name: Run Bandit
        run: uv run --no-sync bandit -q -c pyproject.toml -r src

      - name: Run pip-audit
        run: |
          # CVE-2026-4539: ReDoS in pygments AdlLexer (archetype.py).
          # Local-access-only; no fix version exists yet; pygments is a
          # transitive dep of bandit/rich and is not shipped to users.
          # Remove this ignore once a patched pygments is released.
          #
          # CVE-2026-25645: requests 2.32.5 — blocked by exclude-newer
          # cooldown; fix is in 2.33.0.  requests is an optional e2e dep
          # (not installed in default CI runs).  Remove once 2.33.0 clears
          # the 14-day window.
          uv run --no-sync pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-25645

  typecheck-ty:
    name: Type Check (ty)
    needs: [lockfile]
    runs-on: ubuntu-latest
    continue-on-error: true  # ty is non-blocking while stabilising; promote to blocking when mypy is removed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (no sdist builds)
        run: uv sync --frozen --no-build --no-install-project

      - name: Run ty
        run: uv run --no-sync ty check src
