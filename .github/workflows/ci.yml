name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  lockfile:
    name: Lockfile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is up-to-date
        run: uv lock --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run mypy
        run: uv run mypy src

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run Bandit
        run: uv run bandit -q -c pyproject.toml -r src

      - name: Run pip-audit
        run: |
          # CVE-2026-4539: ReDoS in pygments AdlLexer (archetype.py).
          # Local-access-only; no fix version exists yet; pygments is a
          # transitive dep of bandit/rich and is not shipped to users.
          # Remove this ignore once a patched pygments is released.
          uv run pip-audit --ignore-vuln CVE-2026-4539

      - name: Audit .pth files
        run: |
          echo "Checking for suspicious .pth files..."
          # Every .pth file that contains an import statement is inspected.
          # Known-safe files are verified by content, not just by name, so
          # a tampered version (same filename, different payload) still fails.
          FAIL=0
          while IFS= read -r pth_file; do
            fname=$(basename "$pth_file")
            case "$fname" in
              _virtualenv.pth)
                # Must contain ONLY 'import _virtualenv' — virtualenv's own bootstrap.
                # Strip \r so the check is portable across Linux and Windows runners.
                content=$(tr -d '\r' < "$pth_file" | tr -d '\n')
                if [ "$content" != "import _virtualenv" ]; then
                  echo "::error::$pth_file has unexpected content (possible supply-chain tamper)"
                  cat "$pth_file"
                  FAIL=1
                fi
                ;;
              a1_coverage.pth)
                # Must contain the COVERAGE_PROCESS_START env-var guard.
                # This guard is the safety property: the hook is inert unless
                # the caller explicitly opts in via that env var. A tampered
                # version that removes the guard and runs unconditionally fails.
                if ! grep -q 'COVERAGE_PROCESS_START' "$pth_file"; then
                  echo "::error::$pth_file is missing COVERAGE_PROCESS_START guard (possible tamper)"
                  cat "$pth_file"
                  FAIL=1
                fi
                ;;
              *)
                echo "::error::Unexpected .pth file with import statement: $pth_file"
                cat "$pth_file"
                FAIL=1
                ;;
            esac
          done < <(find .venv -name '*.pth' -exec grep -ql '^import ' {} \; 2>/dev/null)
          [ "$FAIL" -eq 0 ] && echo "All .pth files verified." || exit 1

  typecheck-ty:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    continue-on-error: true  # ty is non-blocking while stabilising; promote to blocking when mypy is removed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run ty
        run: uv run ty check src
