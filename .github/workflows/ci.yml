name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lockfile:
    name: Lockfile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Verify lockfile is up-to-date
        run: uv lock --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run mypy
        run: uv run mypy src

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run Bandit
        run: uv run bandit -q -c pyproject.toml -r src

      - name: Run pip-audit
        run: uv run pip-audit

      - name: Audit .pth files
        run: |
          echo "Checking for suspicious .pth files..."
          SUSPICIOUS=$(find .venv -name '*.pth' -exec grep -l '^import ' {} \; 2>/dev/null || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "::error::Suspicious .pth files with import statements found:"
            echo "$SUSPICIOUS"
            for f in $SUSPICIOUS; do
              echo "--- $f ---"
              cat "$f"
            done
            exit 1
          fi
          echo "No suspicious .pth files found."

  typecheck-ty:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run ty
        run: uvx ty check src
