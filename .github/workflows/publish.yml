name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write       # Required for trusted publishing
  attestations: write   # Required for build provenance

jobs:
  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aws-test-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify tag matches package version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME}"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "::error::Tag '${TAG}' does not match package version 'v${VERSION}'"
            exit 1
          fi
          echo "Tag '${TAG}' matches package version '${VERSION}' — proceeding"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Smoke test
        run: |
          WHEEL=$(ls dist/*.whl)
          uv run --no-project --with "$WHEEL" -- python -c "import aws_test_plugin; print('Smoke test passed')"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

